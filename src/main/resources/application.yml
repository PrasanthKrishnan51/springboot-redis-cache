spring:
  application:
    name: springboot-redis-cache

  # MongoDB           
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/products}
      database: products

    #   Redis           
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  #   Cache           
  cache:
    type: redis
    redis:
      time-to-live: 600000     # 10 minutes (ms)
      cache-null-values: false

#   Server            
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

#   Actuator           
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: always

#   Swagger / OpenAPI          
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    tags-sorter: alpha
    operations-sorter: alpha

#   Logging           
logging:
  level:
    com.example.app: DEBUG
    org.springframework.cache: TRACE
    org.springframework.data.mongodb: DEBUG
